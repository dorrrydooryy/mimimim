<!DOCTYPE html>
<html>
    <head>
        <title>calc</title>
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
        <div class="calc">
            <div class="l-gray"></div>
            
            <input type="text" class="d-gray"> </input>
            <div class="butt">
                <h2 class="btn btn-7">7</h2>
                <h2 class="btn btn-8">8</h2>
                <h2 class="btn btn-9">9</h2>
                <h2 class="btn btn-plus">+</h2>
                <h2 class="btn btn-4">4</h2>
                <h2 class="btn btn-5">5</h2>
                <h2 class="btn btn-6">6</h2>
                <h2 class="btn btn-minus">-</h2>
                <h2 class="btn btn-1">1</h2>
                <h2 class="btn btn-2">2</h2>
                <h2 class="btn btn-3">3</h2>
                <h2 class="btn btn-mult">*</h2>
                <h2 class="btn btn-del">del</h2>
                <h2 class="btn btn-0">0</h2>
                <h2 class="btn btn-equal">=</h2>
                <h2 class="btn btn-div">/</h2>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
